<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Caro GOD AI 50x50</title>
<style>
  body { text-align: center; font-family: Arial; }
  canvas { border: 1px solid black; cursor: pointer; }
</style>
</head>
<body>
<h2>Caro GOD AI 💀 (50x50 - Gần như không thể thắng)</h2>
<p>Bạn = X | AI = O</p>
<canvas id="board" width="700" height="700"></canvas>

<script>
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
const size = 50;
const cell = canvas.width / size;

let board = Array.from({length: size}, () => Array(size).fill(null));
let gameOver = false;

function drawBoard() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<=size;i++){
    ctx.beginPath();
    ctx.moveTo(i*cell,0);
    ctx.lineTo(i*cell,canvas.height);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,i*cell);
    ctx.lineTo(canvas.width,i*cell);
    ctx.stroke();
  }

  ctx.font = (cell*0.6)+"px Arial";
  for(let y=0;y<size;y++){
    for(let x=0;x<size;x++){
      if(board[y][x]){
        ctx.fillText(board[y][x], x*cell+cell/4, y*cell+cell*0.75);
      }
    }
  }
}

function checkWin(x,y,p){
  const d=[[1,0],[0,1],[1,1],[1,-1]];
  for(let [dx,dy] of d){
    let c=1;
    for(let i=1;i<5;i++) if(board[y+dy*i]?.[x+dx*i]===p) c++; else break;
    for(let i=1;i<5;i++) if(board[y-dy*i]?.[x-dx*i]===p) c++; else break;
    if(c>=5) return true;
  }
  return false;
}

function getMoves(){
  let moves=[];
  for(let y=0;y<size;y++){
    for(let x=0;x<size;x++){
      if(!board[y][x]){
        for(let dy=-2;dy<=2;dy++){
          for(let dx=-2;dx<=2;dx++){
            if(board[y+dy]?.[x+dx]){
              moves.push([x,y]);
              dx=3;dy=3;
            }
          }
        }
      }
    }
  }
  return moves.length?moves:[[25,25]];
}

function evaluateBoard(p){
  let score=0;
  const d=[[1,0],[0,1],[1,1],[1,-1]];

  for(let y=0;y<size;y++){
    for(let x=0;x<size;x++){
      if(board[y][x]===p){
        for(let [dx,dy] of d){
          let count=1;
          let open=0;

          for(let i=1;i<5;i++){
            if(board[y+dy*i]?.[x+dx*i]===p) count++;
            else { if(!board[y+dy*i]?.[x+dx*i]) open++; break; }
          }

          for(let i=1;i<5;i++){
            if(board[y-dy*i]?.[x-dx*i]===p) count++;
            else { if(!board[y-dy*i]?.[x-dx*i]) open++; break; }
          }

          if(count>=5) score+=1000000;
          else if(count==4 && open==2) score+=100000;
          else if(count==4) score+=50000;
          else if(count==3 && open==2) score+=10000;
          else if(count==3) score+=2000;
          else if(count==2) score+=200;
        }
      }
    }
  }
  return score;
}

function minimax(depth,isMax,alpha,beta){
  if(depth==0) return evaluateBoard("O")-evaluateBoard("X");

  let moves=getMoves();

  if(isMax){
    let max=-Infinity;
    for(let [x,y] of moves){
      board[y][x]="O";
      let val;
      if(checkWin(x,y,"O")) val=99999999;
      else val=minimax(depth-1,false,alpha,beta);
      board[y][x]=null;

      max=Math.max(max,val);
      alpha=Math.max(alpha,val);
      if(beta<=alpha) break;
    }
    return max;
  } else {
    let min=Infinity;
    for(let [x,y] of moves){
      board[y][x]="X";
      let val;
      if(checkWin(x,y,"X")) val=-99999999;
      else val=minimax(depth-1,true,alpha,beta);
      board[y][x]=null;

      min=Math.min(min,val);
      beta=Math.min(beta,val);
      if(beta<=alpha) break;
    }
    return min;
  }
}

function aiMove(){
  let bestScore=-Infinity;
  let bestMove=null;
  let moves=getMoves();

  for(let [x,y] of moves){
    board[y][x]="O";
    let score=minimax(3,false,-Infinity,Infinity);
    board[y][x]=null;

    if(score>bestScore){
      bestScore=score;
      bestMove=[x,y];
    }
  }

  if(bestMove){
    let [x,y]=bestMove;
    board[y][x]="O";

    if(checkWin(x,y,"O")){
      alert("AI thắng 💀");
      gameOver=true;
    }
    drawBoard();
  }
}

canvas.onclick=e=>{
  if(gameOver) return;

  const r=canvas.getBoundingClientRect();
  const x=Math.floor((e.clientX-r.left)/cell);
  const y=Math.floor((e.clientY-r.top)/cell);

  if(!board[y][x]){
    board[y][x]="X";

    if(checkWin(x,y,"X")){
      alert("Bạn thắng (hiếm 😳)");
      gameOver=true;
    }

    drawBoard();

    if(!gameOver){
      setTimeout(aiMove,50);
    }
  }
};

drawBoard();
</script>
</body>
</html>
