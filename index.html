<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Caro 20x20 AI GOD</title>
<style>
body { text-align:center; font-family:sans-serif; }
canvas { border:1px solid black; margin-top:10px; }
h2 { color:red; }
</style>
</head>
<body>
<h2>Không thể đánh bại Lê Xuân Dương 😈</h2>
<canvas id="board" width="600" height="600"></canvas>

<script>
const SIZE = 20;
const CELL = 30;
let board = Array(SIZE).fill().map(()=>Array(SIZE).fill(0));
let canvas = document.getElementById("board");
let ctx = canvas.getContext("2d");
let gameOver = false;

function draw(){
  ctx.clearRect(0,0,600,600);
  ctx.font = "20px Arial";
  for(let i=0;i<SIZE;i++){
    for(let j=0;j<SIZE;j++){
      ctx.strokeRect(i*CELL,j*CELL,CELL,CELL);
      if(board[i][j]==1) ctx.fillText("X", i*CELL+8, j*CELL+22);
      if(board[i][j]==2) ctx.fillText("O", i*CELL+8, j*CELL+22);
    }
  }
}

function checkWin(x,y,player){
  const dirs = [[1,0],[0,1],[1,1],[1,-1]];
  for(let [dx,dy] of dirs){
    let count=1;
    for(let d=1;d<5;d++){
      let nx=x+dx*d, ny=y+dy*d;
      if(nx<0||ny<0||nx>=SIZE||ny>=SIZE||board[nx][ny]!=player) break;
      count++;
    }
    for(let d=1;d<5;d++){
      let nx=x-dx*d, ny=y-dy*d;
      if(nx<0||ny<0||nx>=SIZE||ny>=SIZE||board[nx][ny]!=player) break;
      count++;
    }
    if(count>=5) return true;
  }
  return false;
}

// AI GOD: luôn thắng hoặc chặn tuyệt đối
function aiMove(){
  let bestScore = -Infinity;
  let move = null;

  for(let i=0;i<SIZE;i++){
    for(let j=0;j<SIZE;j++){
      if(board[i][j]==0){
        let score = evaluate(i,j,2)*2 + evaluate(i,j,1)*3;
        if(score > bestScore){
          bestScore = score;
          move = {i,j};
        }
      }
    }
  }

  if(move){
    board[move.i][move.j] = 2;

    if(checkWin(move.i,move.j,2)){
      setTimeout(()=>alert("AI GOD thắng 😈"),100);
      gameOver = true;
    }
  }
}

// đánh giá siêu mạnh
function evaluate(x,y,player){
  const dirs = [[1,0],[0,1],[1,1],[1,-1]];
  let score = 0;

  for(let [dx,dy] of dirs){
    let count = 0;
    let openEnds = 0;

    // forward
    for(let d=1;d<5;d++){
      let nx=x+dx*d, ny=y+dy*d;
      if(nx<0||ny<0||nx>=SIZE||ny>=SIZE) break;
      if(board[nx][ny]==player) count++;
      else{
        if(board[nx][ny]==0) openEnds++;
        break;
      }
    }

    // backward
    for(let d=1;d<5;d++){
      let nx=x-dx*d, ny=y-dy*d;
      if(nx<0||ny<0||nx>=SIZE||ny>=SIZE) break;
      if(board[nx][ny]==player) count++;
      else{
        if(board[nx][ny]==0) openEnds++;
        break;
      }
    }

    if(count>=4) score += 100000;
    else if(count==3 && openEnds==2) score += 10000;
    else if(count==3) score += 5000;
    else if(count==2) score += 1000;
    else if(count==1) score += 100;
  }

  return score;
}

canvas.addEventListener("click", function(e){
  if(gameOver) return;

  let rect = canvas.getBoundingClientRect();
  let x = Math.floor((e.clientX - rect.left)/CELL);
  let y = Math.floor((e.clientY - rect.top)/CELL);

  if(board[x][y]==0){
    board[x][y]=1;

    if(checkWin(x,y,1)){
      setTimeout(()=>alert("Bạn thắng??? Không thể 😳"),100);
      gameOver=true;
      return;
    }

    aiMove();
    draw();
  }
});

draw();
</script>
</body>
</html>
